<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="/homey.js" data-origin="pair"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 24px;
      background: #fff;
      color: #1a1a1a;
    }
    .card {
      width: 100%;
      max-width: 360px;
    }
    h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      background: #fafafa;
      color: #1a1a1a;
      margin-bottom: 28px;
      cursor: pointer;
    }
    select:focus { border-color: #FF6B35; }
    button {
      width: 100%;
      padding: 13px;
      background: #FF6B35;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #e85d2a; }
    button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Velg region</h2>
    <p>Velg regionen som samsvarer med din PetKit-konto.<br>
      Brukere i Norge skal velge <strong>Europa (EU)</strong>.</p>

    <label for="region">Server-region</label>
    <select id="region">
      <option value="EU">Europa (EU) — anbefalt for Norge</option>
      <option value="US">USA / Amerika</option>
      <option value="Asia">Asia / Sørøst-Asia</option>
      <option value="China">Kina</option>
    </select>

    <button id="next">Neste</button>
  </div>

  <script>
    function onHomeyReady(Homey) {
      Homey.ready();

      document.getElementById('next').addEventListener('click', function () {
        var btn = document.getElementById('next');
        var region = document.getElementById('region').value;
        btn.disabled = true;

        Homey.emit('select_region', { region: region }, function (err) {
          if (err) {
            btn.disabled = false;
            return Homey.alert(err.message || 'Noe gikk galt');
          }
          Homey.nextView();
        });
      });
    }
  </script>
</body>
</html>
