<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="/homey.js" data-origin="settings"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
      background: #fff;
      color: #1a1a1a;
      max-width: 480px;
    }
    h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    p { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.6; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: #fafafa;
      color: #1a1a1a;
      margin-bottom: 20px;
    }
    select:focus { border-color: #FF6B35; }
    button {
      padding: 10px 22px;
      background: #FF6B35;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #e85d2a; }
    #msg { font-size: 13px; color: #4CAF50; margin-left: 12px; display: none; }
  </style>
</head>
<body>
  <h2>PetKit Innstillinger</h2>
  <p>Velg regionen som samsvarer med din PetKit-konto.<br>
  <strong>Norge:</strong> velg Europa (EU).</p>

  <label>Server-region</label>
  <select id="region">
    <option value="EU">Europa (EU) — anbefalt for Norge</option>
    <option value="US">USA / Amerika</option>
    <option value="Asia">Asia</option>
    <option value="China">Kina</option>
  </select>

  <button onclick="save()">Lagre</button>
  <span id="msg">✓ Lagret!</span>

  <script>
    function onHomeyReady(Homey) {
      Homey.get('region', function(err, value) {
        if (!err && value) {
          document.getElementById('region').value = value;
        }
      });

      window._homey = Homey;
      Homey.ready();
    }

    function save() {
      if (!window._homey) return;
      var region = document.getElementById('region').value;
      window._homey.set('region', region, function(err) {
        if (!err) {
          var el = document.getElementById('msg');
          el.style.display = 'inline';
          setTimeout(function() { el.style.display = 'none'; }, 2000);
        }
      });
    }
  </script>
</body>
</html>
